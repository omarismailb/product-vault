name: product-wiki-check
on:
  pull_request:
  push:
    branches: [main]
jobs:
  product-wiki-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm run pw:check --if-present || node scripts/product-wiki-check.mjs
