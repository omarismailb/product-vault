name: product-wiki-routines

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  routines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/routine-runner.mjs --all
